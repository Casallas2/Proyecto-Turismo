<div class="min-h-screen bg-slate-50" *ngIf="site() as site">
  <div class="max-w-4xl mx-auto px-4 py-6 space-y-6">
    <div class="flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-semibold text-slate-800">{{ site.name }}</h1>
        <p class="text-sm text-slate-500 mt-1">{{ site.location }}</p>
      </div>
      <div class="flex items-center gap-2">
        <a
          *ngIf="auth.isAdmin()"
          [routerLink]="['/admin/sites', site.id, 'edit']"
          class="text-sm text-slate-600 hover:underline"
        >
          Editar
        </a>
        <a
          routerLink="/sites"
          class="text-sm text-blue-600 hover:underline"
        >
          Volver
        </a>
      </div>
    </div>

    <div class="grid md:grid-cols-3 gap-6">
      <div class="md:col-span-2 space-y-4">
        <div
          *ngIf="site.images?.length; else noImagePlaceholder"
          class="rounded-lg overflow-hidden bg-slate-200"
        >
          <img
            *ngIf="site.images?.[0] as firstImage"
            [src]="getImageUrl(firstImage.id)"
            alt="{{ site.name }}"
            class="w-full h-56 object-cover"
          />
        </div>
        <ng-template #noImagePlaceholder>
          <div class="h-56 bg-slate-200 rounded-lg flex items-center justify-center text-slate-500 text-sm">
            Sin imagen
          </div>
        </ng-template>
        <p class="text-sm text-slate-700">
          {{ site.description }}
        </p>
      </div>

      <div class="bg-white rounded-lg shadow p-4 space-y-4">
        <div>
          <div class="text-xs uppercase text-slate-500">Tipo de turismo</div>
          <div class="text-sm font-medium text-slate-800">{{ site.type }}</div>
        </div>

        <div>
          <div class="text-xs uppercase text-slate-500">Precio por persona</div>
          <div class="text-lg font-semibold text-blue-700">
            {{ site.pricePerPerson }}
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-medium text-slate-600">Fecha</label>
          <input
            type="date"
            class="w-full border rounded px-2 py-1 text-sm"
            [(ngModel)]="date"
          />
        </div>

        <div class="space-y-2">
          <label class="block text-xs font-medium text-slate-600">Número de personas</label>
          <input
            type="number"
            min="1"
            [max]="site.maxCapacity"
            class="w-full border rounded px-2 py-1 text-sm"
            [(ngModel)]="peopleCount"
          />
        </div>

        <div *ngIf="error()" class="text-xs text-red-600">
          {{ error() }}
        </div>
        <div *ngIf="success()" class="text-xs text-green-600">
          {{ success() }}
        </div>

        <button
          type="button"
          class="w-full px-3 py-2 rounded bg-blue-600 text-white text-sm font-medium hover:bg-blue-700"
          (click)="createReservation()"
        >
          Reservar
        </button>
      </div>
    </div>
  </div>
</div>

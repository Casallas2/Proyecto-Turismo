<div class="min-h-screen bg-slate-50">
  <div class="max-w-5xl mx-auto px-4 py-6 space-y-4">
    <div class="flex justify-between items-center">
      <h1 class="text-2xl font-semibold text-slate-800">Mis reservas</h1>
      <a
        routerLink="/sites"
        class="text-sm text-blue-600 hover:underline"
      >
        Volver a sitios
      </a>
    </div>

    <div *ngIf="error()" class="text-sm text-red-600">
      {{ error() }}
    </div>

    <div class="bg-white rounded-lg shadow overflow-x-auto">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-100">
          <tr>
            <th class="px-3 py-2 text-left">Número</th>
            <th class="px-3 py-2 text-left">Sitio</th>
            <th class="px-3 py-2 text-left">Fecha</th>
            <th class="px-3 py-2 text-left">Personas</th>
            <th class="px-3 py-2 text-left">Estado</th>
            <th class="px-3 py-2 text-left">Total</th>
            <th class="px-3 py-2"></th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let r of reservations()"
            class="border-t hover:bg-slate-50"
          >
            <td class="px-3 py-2">{{ r.reservationNumber }}</td>
            <td class="px-3 py-2">{{ r.site.name }}</td>
            <td class="px-3 py-2">{{ r.reservationDate }}</td>
            <td class="px-3 py-2">{{ r.peopleCount }}</td>
            <td class="px-3 py-2">{{ r.status }}</td>
            <td class="px-3 py-2">{{ r.totalPrice }}</td>
            <td class="px-3 py-2 text-right space-x-2">
              <a
                *ngIf="r.status === 'PENDIENTE_EXTERNO'"
                [routerLink]="['/reservations', r.id, 'confirm']"
                class="inline-block px-3 py-1 rounded bg-blue-600 text-white text-xs hover:bg-blue-700"
              >
                Confirmar
              </a>
              <button
                *ngIf="r.status === 'PENDIENTE_EXTERNO'"
                type="button"
                class="inline-block px-3 py-1 rounded bg-red-600 text-white text-xs hover:bg-red-700"
                (click)="cancel(r)"
              >
                Cancelar
              </button>
            </td>
          </tr>
          <tr *ngIf="reservations().length === 0">
            <td
              colspan="7"
              class="px-3 py-4 text-center text-slate-500"
            >
              Aún no tienes reservas.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

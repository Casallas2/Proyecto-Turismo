<div class="min-h-screen flex items-center justify-center bg-slate-50">
  <div class="w-full max-w-md bg-white shadow rounded-lg p-6 space-y-4">
    <h1 class="text-2xl font-semibold text-slate-800 text-center">Crear cuenta</h1>

    <form class="space-y-4" (ngSubmit)="onSubmit()">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nombre completo</label>
        <input
          type="text"
          [(ngModel)]="fullName"
          name="fullName"
          class="w-full border rounded px-3 py-2 text-sm"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Correo electrónico</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          class="w-full border rounded px-3 py-2 text-sm"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          class="w-full border rounded px-3 py-2 text-sm"
          required
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Idioma</label>
        <select
          [(ngModel)]="language"
          name="language"
          class="w-full border rounded px-3 py-2 text-sm"
        >
          <option value="ES">Español</option>
          <option value="EN">Inglés</option>
          <option value="FR">Francés</option>
        </select>
      </div>

      <div *ngIf="error()" class="text-sm text-red-600">
        {{ error() }}
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded text-sm font-medium hover:bg-blue-700 disabled:opacity-50"
        [disabled]="loading()"
      >
        {{ loading() ? 'Creando cuenta...' : 'Registrarse' }}
      </button>
    </form>

    <p class="text-center text-sm text-slate-600">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-blue-600 hover:underline">Inicia sesión</a>
    </p>
  </div>
</div>
